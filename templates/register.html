{% extends "base.html" %}
{% block title %}Create Account — CloseTheJob{% endblock %}

{% block content %}
<div style="min-height:90vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;overflow:hidden;">
  <div class="dot-grid" style="position:absolute;inset:0;opacity:0.4;"></div>

  <div style="position:relative;z-index:2;width:100%;max-width:440px;" class="fade-up">

    <div style="margin-bottom:32px;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--orange);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;">// New account</div>
      <h1 class="font-display" style="font-size:52px;color:var(--text);line-height:1;">Start Closing<br />More Jobs.</h1>
      <p style="color:var(--text-muted);margin-top:10px;font-size:14px;">3 free proposals included. No credit card required.</p>
    </div>

    <div class="ctj-card" style="padding:32px;">
      <form method="POST" action="{{ url_for('register') }}">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
          <div style="grid-column:1/-1;">
            <label class="ctj-label">Your Name <span>*</span></label>
            <input type="text" name="name" required class="ctj-input" placeholder="John Smith" />
          </div>
          <div style="grid-column:1/-1;">
            <label class="ctj-label">Company Name</label>
            <input type="text" name="company_name" class="ctj-input" placeholder="Smith HVAC Services" />
          </div>
          <div style="grid-column:1/-1;">
            <label class="ctj-label">Your Trade <span>*</span></label>
            <select name="trade_type" class="ctj-input">
              <option value="HVAC">HVAC</option>
              <option value="Plumbing">Plumbing</option>
              <option value="Electrical">Electrical</option>
              <option value="Roofing">Roofing</option>
              <option value="Landscaping">Landscaping</option>
              <option value="General Contractor" selected>General Contractor</option>
              <option value="Painting">Painting</option>
              <option value="Flooring">Flooring</option>
              <option value="Pest Control">Pest Control</option>
              <option value="Pressure Washing">Pressure Washing</option>
              <option value="Window Washing">Window Washing</option>
              <option value="Epoxy Flooring">Epoxy Flooring</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div style="grid-column:1/-1;">
            <label class="ctj-label">Email Address <span>*</span></label>
            <input type="email" name="email" required class="ctj-input" placeholder="john@smithhvac.com" />
          </div>
          <div style="grid-column:1/-1;">
            <label class="ctj-label">Password <span>*</span></label>
            <input type="password" name="password" required minlength="8" class="ctj-input" placeholder="At least 8 characters" />
          </div>
        </div>

        <button type="submit" class="btn-orange" style="width:100%;justify-content:center;padding:14px;font-size:14px;clip-path:none;">
          Create Free Account →
        </button>
      </form>
    </div>

    <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:20px;">
      Already have an account?
      <a href="{{ url_for('login') }}" style="color:var(--orange);text-decoration:none;font-weight:600;">Log in</a>
    </p>

  </div>
</div>
{% endblock %}
