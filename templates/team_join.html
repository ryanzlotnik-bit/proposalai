{% extends "base.html" %}
{% block title %}Join Team — CloseTheJob{% endblock %}

{% block content %}
<div style="min-height:90vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;">
  <div style="width:100%;max-width:440px;">
    <div style="margin-bottom:32px;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--orange);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;">// Team Invitation</div>
      <h1 class="font-display" style="font-size:44px;color:var(--text);line-height:1;">Join {{ owner.company_name or owner.name }}.</h1>
      <p style="color:var(--text-muted);margin-top:10px;font-size:14px;">{{ owner.name }} has invited you to their CloseTheJob account as a team member.</p>
    </div>

    <div class="ctj-card" style="padding:32px;">
      <form method="POST">
        <div style="margin-bottom:16px;">
          <label class="ctj-label">Your Name</label>
          <input type="text" name="name" required class="ctj-input" placeholder="Jane Smith" />
        </div>
        <div style="margin-bottom:16px;">
          <label class="ctj-label">Email</label>
          <input type="email" value="{{ invite.email }}" disabled class="ctj-input" style="opacity:0.6;" />
        </div>
        <div style="margin-bottom:24px;">
          <label class="ctj-label">Choose a Password</label>
          <input type="password" name="password" required minlength="8" class="ctj-input" placeholder="At least 8 characters" />
        </div>
        <button type="submit" class="btn-orange" style="width:100%;justify-content:center;padding:14px;font-size:14px;clip-path:none;border:none;cursor:pointer;">
          Accept Invitation →
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
