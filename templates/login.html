{% extends "base.html" %}
{% block title %}Log In — CloseTheJob{% endblock %}

{% block content %}
<div style="min-height:90vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;overflow:hidden;">
  <div class="dot-grid" style="position:absolute;inset:0;opacity:0.4;"></div>

  <div style="position:relative;z-index:2;width:100%;max-width:400px;" class="fade-up">

    <div style="margin-bottom:32px;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--orange);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;">// Welcome back</div>
      <h1 class="font-display" style="font-size:52px;color:var(--text);line-height:1;">Log Back<br />In.</h1>
    </div>

    <div class="ctj-card" style="padding:32px;">
      <form method="POST" action="{{ url_for('login') }}">
        <div style="margin-bottom:16px;">
          <label class="ctj-label">Email Address</label>
          <input type="email" name="email" required autofocus class="ctj-input" placeholder="john@smithhvac.com" />
        </div>
        <div style="margin-bottom:24px;">
          <label class="ctj-label">Password</label>
          <input type="password" name="password" required class="ctj-input" placeholder="Your password" />
        </div>
        <button type="submit" class="btn-orange" style="width:100%;justify-content:center;padding:14px;font-size:14px;clip-path:none;">
          Log In →
        </button>
      </form>
    </div>

    <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:20px;">
      Don't have an account?
      <a href="{{ url_for('register') }}" style="color:var(--orange);text-decoration:none;font-weight:600;">Start free trial</a>
    </p>

  </div>
</div>
{% endblock %}
